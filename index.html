<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>회의용 카페 주문서</title>
    <style>
        :root { --primary: #0071e3; --ice: #007aff; --hot: #ff3b30; --bg: #f5f5f7; --border: #e5e5ea; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        
        .container { width: 100%; max-width: 500px; background: white; padding: 16px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); box-sizing: border-box; }
        h1 { font-size: 19px; text-align: center; color: #1d1d1f; margin: 0 0 16px 0; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 6px; margin-bottom: 20px; }
        .menu-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .menu-name { font-size: 15px; font-weight: 600; color: #1d1d1f; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40%; margin-right: 6px; }
        
        .counter-group { display: flex; gap: 6px; flex-grow: 1; justify-content: flex-end; align-items: center; }
        .counter-box { display: flex; align-items: center; background: white; border: 1px solid var(--border); border-radius: 6px; padding: 1px; flex-shrink: 0; }
        .counter-box.ice { border-color: #bcd9ff; }
        .counter-box.hot { border-color: #ffcccc; }
        
        .btn-cnt { border: none; background: #e5e5ea; color: #333; width: 30px; height: 30px; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-cnt:active { background: #d1d1d6; }
        .btn-cnt.ice-plus { background-color: #e0eeff; color: var(--ice); }
        .btn-cnt.ice-plus:active { background-color: #c7e1ff; }
        .btn-cnt.hot-plus { background-color: #ffeae9; color: var(--hot); }
        .btn-cnt.hot-plus:active { background-color: #ffdad9; }

        .cnt-num { font-size: 15px; font-weight: bold; min-width: 26px; text-align: center; color: #333; }
        .counter-box.ice .cnt-num { color: var(--ice); }
        .counter-box.hot .cnt-num { color: var(--hot); }

        .summary-box { background: #fbfbfd; border-radius: 10px; padding: 12px; margin-bottom: 20px; border: 1px solid var(--border); border-left: 4px solid var(--primary); }
        .summary-title { font-size: 14px; font-weight: bold; margin-bottom: 6px; color: #1d1d1f; display: flex; justify-content: space-between; }
        .summary-text { font-size: 13px; color: #444; line-height: 1.4; white-space: pre-line; word-break: break-all; }

        .action-btns { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn-main { flex: 1; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-main:active { opacity: 0.8; }
        .btn-reset { background: #8e8e93; color: white; }
        .btn-copy { background: var(--primary); color: white; }
        
        /* 편집 구역 스타일 개편 */
        .admin-section { border-top: 1px dashed #d1d1d6; padding-top: 16px; margin-top: 10px; }
        .admin-title { font-size: 13px; color: #8e8e93; margin-bottom: 8px; font-weight: bold; }
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
        .input-group input[type="text"] { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
        
        /* 모바일 터치 미스 방지를 위해 체크박스 영역 분리 및 확대 */
        .check-container { display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 4px; }
        .check-container input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; margin: 0; }
        .checkbox-label { font-size: 13px; color: #333; font-weight: 600; user-select: none; cursor: pointer; }
        
        .manage-list { max-height: 130px; overflow-y: auto; font-size: 12px; color: #777; padding: 0 4px; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f2f2f2; }
        .manage-btn-group { display: flex; gap: 4px; }
        .btn-order { background: #f2f2f7; border: 1px solid var(--border); border-radius: 4px; color: #555; cursor: pointer; font-size: 11px; padding: 2px 6px; font-weight: bold; }
        .btn-del { background: none; border: none; color: var(--hot); cursor: pointer; font-size: 11px; padding: 2px 5px; margin-left: 4px; }

        @media (max-width: 380px) {
            .container { padding: 12px; }
            .menu-card { padding: 6px 8px; }
            .menu-name { font-size: 14px; max-width: 35%; }
            .counter-group { gap: 4px; }
            .btn-cnt { width: 28px; height: 28px; font-size: 16px; }
            .cnt-num { min-width: 22px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 회의 주문 취합기</h1>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="summary-box">
        <div class="summary-title">
            <span>🛍️ 최종 내역</span>
            <span id="totalCount" style="color:var(--primary)">총 0개</span>
        </div>
        <div class="summary-text" id="summaryText">메뉴를 선택해주세요.</div>
    </div>

    <div class="action-btns">
        <button class="btn-main btn-reset" onclick="resetCounts()">초기화</button>
        <button class="btn-main btn-copy" onclick="copyToClipboard()">복사</button>
    </div>

    <!-- [오류 수정] 체크박스와 라벨 구조를 완벽히 독립시켜 모바일 터치 씹힘 현상 방지 -->
    <div class="admin-section">
        <div class="admin-title">⚙️ 메뉴판 편집 (순서 조정 및 추가/삭제)</div>
        <div class="input-group">
            <input type="text" id="newMenuName" placeholder="메뉴명 입력">
            <div class="check-container">
                <input type="checkbox" id="hasTemp" checked>
                <label for="hasTemp" class="checkbox-label">H/I</label>
            </div>
            <button class="btn-cnt" style="background:var(--primary); color:white; width:45px; height:33px; font-size:13px; border-radius:6px;" onclick="addMenu()">등록</button>
        </div>
        <div class="manage-list" id="manageList"></div>
    </div>
</div>

<script>
    const defaultMenus = [
        { name: '아메리카노', hasTemp: true },
        { name: '카페라떼', hasTemp: true },
        { name: '바닐라라떼', hasTemp: true },
        { name: '녹차라떼', hasTemp: true },
        { name: '복숭아티', hasTemp: false },
        { name: '자몽에이드', hasTemp: false }
    ];

    // 신규 데이터를 안전하게 불러오기 위해 버전 접미사 v5로 변경
    let menuList = JSON.parse(localStorage.getItem('mtMenuBoard_v5')) || defaultMenus;
    let orderCounts = JSON.parse(localStorage.getItem('mtOrders_v5')) || {};

    function render() {
        const grid = document.getElementById('menuGrid');
        const manageList = document.getElementById('manageList');
        grid.innerHTML = '';
        manageList.innerHTML = '';

        menuList.forEach((menu, index) => {
            const card = document.createElement('div');
            card.className = 'menu-card';
            
            const nameEl = document.createElement('div');
            nameEl.className = 'menu-name';
            nameEl.innerText = menu.name;
            card.appendChild(nameEl);

            const counterGroup = document.createElement('div');
            counterGroup.className = 'counter-group';

            if (menu.hasTemp) {
                const iceKey = `${menu.name}(I)`;
                const iceCnt = orderCounts[iceKey] || 0;
                counterGroup.innerHTML += `
                    <div class="counter-box ice">
                        <button class="btn-cnt" onclick="changeCnt('${iceKey}', -1)">-</button>
                        <span class="cnt-num">${iceCnt}</span>
                        <button class="btn-cnt ice-plus" onclick="changeCnt('${iceKey}', 1)">+</button>
                    </div>
                `;
                const hotKey = `${menu.name}(H)`;
                const hotCnt = orderCounts[hotKey] || 0;
                counterGroup.innerHTML += `
                    <div class="counter-box hot">
                        <button class="btn-cnt" onclick="changeCnt('${hotKey}', -1)">-</button>
                        <span class="cnt-num">${hotCnt}</span>
                        <button class="btn-cnt hot-plus" onclick="changeCnt('${hotKey}', 1)">+</button>
                    </div>
                `;
            } else {
                const key = menu.name;
                const cnt = orderCounts[key] || 0;
                counterGroup.innerHTML += `
                    <div class="counter-box">
                        <button class="btn-cnt" onclick="changeCnt('${key}', -1)">-</button>
                        <span class="cnt-num">${cnt}</span>
                        <button class="btn-cnt" style="background-color:#f0f0f2" onclick="changeCnt('${key}', 1)">+</button>
                    </div>
                `;
            }

            card.appendChild(counterGroup);
            grid.appendChild(card);

            const mItem = document.createElement('div');
            mItem.className = 'manage-item';
            mItem.innerHTML = `
                <span>${menu.name} ${menu.hasTemp ? '(H/I)' : ''}</span>
                <div class="manage-btn-group">
                    <button class="btn-order" onclick="moveMenu(${index}, -1)">▲</button>
                    <button class="btn-order" onclick="moveMenu(${index}, 1)">▼</button>
                    <button class="btn-del" onclick="deleteMenu(${index})">삭제</button>
                </div>
            `;
            manageList.appendChild(mItem);
        });

        updateSummary();
        localStorage.setItem('mtMenuBoard_v5', JSON.stringify(menuList));
        localStorage.setItem('mtOrders_v5', JSON.stringify(orderCounts));
    }

    function moveMenu(index, direction) {
        const targetIndex = index + direction;
        if (targetIndex < 0 || targetIndex >= menuList.length) return;
        
        const temp = menuList[index];
        menuList[index] = menuList[targetIndex];
        menuList[targetIndex] = temp;
        
        render();
    }

    function changeCnt(key, val) {
        let current = orderCounts[key] || 0;
        current += val;
        if (current <= 0) {
            delete orderCounts[key];
        } else {
            orderCounts[key] = current;
        }
        render();
    }

    function updateSummary() {
        const textDisplay = document.getElementById('summaryText');
        const totalDisplay = document.getElementById('totalCount');
        
        let total = 0;
        let summaryArr = [];

        menuList.forEach(menu => {
            if (menu.hasTemp) {
                const iceKey = `${menu.name}(I)`;
                const hotKey = `${menu.name}(H)`;
                
                if (orderCounts[iceKey] > 0) {
                    total += orderCounts[iceKey];
                    summaryArr.push(`${iceKey} ${orderCounts[iceKey]}`);
                }
                if (orderCounts[hotKey] > 0) {
                    total += orderCounts[hotKey];
                    summaryArr.push(`${hotKey} ${orderCounts[hotKey]}`);
                }
            } else {
                if (orderCounts[menu.name] > 0) {
                    total += orderCounts[menu.name];
                    summaryArr.push(`${menu.name} ${orderCounts[menu.name]}`);
                }
            }
        });

        totalDisplay.innerText = `총 ${total}개`;
        textDisplay.innerText = summaryArr.length === 0 ? '메뉴를 선택해주세요.' : summaryArr.join(', ');
    }

    function resetCounts() {
        if(Object.keys(orderCounts).length > 0 && confirm('수량을 모두 0으로 초기화할까요?')) {
            orderCounts = {};
            render();
        }
    }

    function addMenu() {
        const nameInput = document.getElementById('newMenuName');
        const checkbox = document.getElementById('hasTemp');
        const name = nameInput.value.trim();
        
        // 확실하게 현재 체크박스의 상태 boolean 값을 가져옵니다.
        const hasTemp = checkbox.checked; 

        if (!name) return;
        if (name.length > 20) { alert('메뉴 이름이 너무 깁니다.'); return; }
        if (menuList.some(m => m.name === name)) { alert('이미 있는 메뉴입니다.'); return; }

        menuList.push({ name, hasTemp });
        
        nameInput.value = '';
        // 등록 후 다음 입력을 위해 체크박스는 기본 체크(true) 상태로 유지
        checkbox.checked = true; 
        
        render();
    }

    function deleteMenu(index) {
        if(confirm(`[${menuList[index].name}] 메뉴를 메뉴판에서 삭제할까요?`)) {
            const targetName = menuList[index].name;
            delete orderCounts[targetName];
            delete orderCounts[`${targetName}(I)`];
            delete orderCounts[`${targetName}(H)`];
            
            menuList.splice(index, 1);
            render();
        }
    }

    function copyToClipboard() {
        const summaryText = document.getElementById('summaryText').innerText;
        const totalText = document.getElementById('totalCount').innerText;
        
        if (summaryText === '메뉴를 선택해주세요.' || totalText === '총 0개') {
            alert('선택한 메뉴가 없습니다.');
            return;
        }

        const dateString = new Date().toLocaleDateString('ko-KR', {month: 'short', day: 'numeric'});
        const fullText = `[☕ ${dateString} 카페 주문]\n${summaryText.replace(/,/g, '\n')}\n➡️ ${totalText}`;
        
        navigator.clipboard.writeText(fullText).then(() => {
            alert('주문 내역이 복사되었습니다.\n카톡에 붙여넣기 하세요!');
        }).catch(err => {
            alert('복사 실패. 직접 복사해주세요.');
        });
    }

    render();
</script>

</body>
</html>
