<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회의용 카페 메뉴 취합기</title>
    <style>
        :root { --primary: #0071e3; --ice: #007aff; --hot: #ff3b30; --bg: #f5f5f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: white; padding: 24px; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        h1 { font-size: 22px; text-align: center; color: #1d1d1f; margin-top: 0; }
        
        /* 메뉴판 그리드 */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 24px; }
        .menu-card { background: #fbfbfd; border: 1px solid #e5e5ea; border-radius: 12px; padding: 14px; display: flex; justify-content: space-between; align-items: center; }
        .menu-name { font-size: 16px; font-weight: 600; color: #1d1d1f; flex: 1; }
        
        /* 카운터 스타일 */
        .counter-group { display: flex; gap: 10px; }
        .counter-box { display: flex; align-items: center; background: white; border: 1px solid #d1d1d6; border-radius: 8px; padding: 2px; }
        .counter-box.ice { border-color: var(--ice); }
        .counter-box.hot { border-color: var(--hot); }
        .type-label { font-size: 12px; font-weight: bold; padding: 0 6px; }
        .type-label.ice { color: var(--ice); }
        .type-label.hot { color: var(--hot); }
        
        .btn-cnt { border: none; background: #e5e5ea; color: #333; width: 32px; height: 32px; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-cnt:active { background: #d1d1d6; }
        .cnt-num { font-size: 16px; font-weight: bold; min-width: 28px; text-align: center; }

        /* 결과 요약창 */
        .summary-box { background: #f5f5f7; border-radius: 12px; padding: 16px; margin-bottom: 24px; border-left: 5px solid var(--primary); }
        .summary-title { font-weight: bold; margin-bottom: 8px; color: #1d1d1f; display: flex; justify-content: space-between; }
        .summary-text { font-size: 15px; color: #333; line-height: 1.5; white-space: pre-line; }

        /* 하단 제어 및 메뉴 관리 */
        .action-btns { display: flex; gap: 10px; margin-bottom: 24px; }
        .btn-main { flex: 1; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .btn-reset { background: #8e8e93; color: white; }
        .btn-copy { background: var(--primary); color: white; }
        
        .admin-section { border-top: 1px dashed #c7c7cc; padding-top: 20px; }
        .admin-title { font-size: 14px; color: #8e8e93; margin-bottom: 10px; font-weight: bold; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #d1d1d6; border-radius: 8px; }
        .checkbox-label { display: flex; align-items: center; font-size: 14px; color: #555; gap: 4px; cursor: pointer; }
        
        .manage-list { max-height: 120px; overflow-y: auto; font-size: 13px; color: #666; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
        .btn-del { background: none; border: none; color: var(--hot); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 회의 메뉴 수량 취합기</h1>

    <!-- 메뉴 선택 영역 -->
    <div class="menu-grid" id="menuGrid"></div>

    <!-- 주문 요약 영역 -->
    <div class="summary-box">
        <div class="summary-title">
            <span>🛍️ 최종 주문 내역</span>
            <span id="totalCount" style="color:var(--primary)">총 0잔</span>
        </div>
        <div class="summary-text" id="summaryText">선택된 메뉴가 없습니다.</div>
    </div>

    <!-- 제어 버튼 -->
    <div class="action-btns">
        <button class="btn-main btn-reset" onclick="resetCounts()">수량 초기화</button>
        <button class="btn-main btn-copy" onclick="copyToClipboard()">주문서 복사하기</button>
    </div>

    <!-- 메뉴 설정 (관리) -->
    <div class="admin-section">
        <div class="admin-title">⚙️ 메뉴판 설정 (추가/삭제)</div>
        <div class="input-group">
            <input type="text" id="newMenuName" placeholder="예: 바닐라라떼, 자몽에이드">
            <label class="checkbox-label">
                <input type="checkbox" id="hasTemp" checked> HOT/ICE 선택
            </label>
            <button class="btn-cnt" style="background:var(--primary); color:white; width:auto; padding:0 12px; font-size:14px;" onclick="addMenu()">등록</button>
        </div>
        <div class="manage-list" id="manageList"></div>
    </div>
</div>

<script>
    // 기본 메뉴 데이터 구조
    const defaultMenus = [
        { name: '아메리카노', hasTemp: true },
        { name: '카페라떼', hasTemp: true },
        { name: '바닐라라떼', hasTemp: true },
        { name: '복숭아아이스티', hasTemp: false },
        { name: '자몽에이드', hasTemp: false }
    ];

    let menuList = JSON.parse(localStorage.getItem('meetingMenuBoard')) || defaultMenus;
    // 현재 수량 저장 (새로고침해도 유지되도록 로컬스토리지 연동)
    let orderCounts = JSON.parse(localStorage.getItem('currentMeetingOrders')) || {};

    // 화면 렌더링
    function render() {
        const grid = document.getElementById('menuGrid');
        const manageList = document.getElementById('manageList');
        grid.innerHTML = '';
        manageList.innerHTML = '';

        menuList.forEach((menu, index) => {
            // 1. 메인 카운터 보드 생성
            const card = document.createElement('div');
            card.className = 'menu-card';
            
            let counterHTML = '';
            if (menu.hasTemp) {
                // HOT, ICE 각각의 키 생성
                const iceKey = `${menu.name}(ICE)`;
                const hotKey = `${menu.name}(HOT)`;
                const iceCnt = orderCounts[iceKey] || 0;
                const hotCnt = orderCounts[hotKey] || 0;

                counterHTML = `
                    <div class="counter-group">
                        <div class="counter-box ice">
                            <span class="type-label ice">ICE</span>
                            <button class="btn-cnt" onclick="changeCnt('${iceKey}', -1)">-</button>
                            <span class="cnt-num">${iceCnt}</span>
                            <button class="btn-cnt" onclick="changeCnt('${iceKey}', 1)">+</button>
                        </div>
                        <div class="counter-box hot">
                            <span class="type-label hot">HOT</span>
                            <button class="btn-cnt" onclick="changeCnt('${hotKey}', -1)">-</button>
                            <span class="cnt-num">${hotCnt}</span>
                            <button class="btn-cnt" onclick="changeCnt('${hotKey}', 1)">+</button>
                        </div>
                    </div>
                `;
            } else {
                // 단일 온도/사이즈 메뉴
                const key = menu.name;
                const cnt = orderCounts[key] || 0;
                counterHTML = `
                    <div class="counter-box">
                        <button class="btn-cnt" onclick="changeCnt('${key}', -1)">-</button>
                        <span class="cnt-num">${cnt}</span>
                        <button class="btn-cnt" onclick="changeCnt('${key}', 1)">+</button>
                    </div>
                `;
            }

            card.innerHTML = `<div class="menu-name">${menu.name}</div>${counterHTML}`;
            grid.appendChild(card);

            // 2. 하단 관리자 목록 생성
            const mItem = document.createElement('div');
            mItem.className = 'manage-item';
            mItem.innerHTML = `
                <span>${menu.name} ${menu.hasTemp ? '(HOT/ICE)' : '(단일)'}</span>
                <button class="btn-del" onclick="deleteMenu(${index})">법적삭제</button>
            `;
            manageList.appendChild(mItem);
        });

        updateSummary();
        localStorage.setItem('meetingMenuBoard', JSON.stringify(menuList));
        localStorage.setItem('currentMeetingOrders', JSON.stringify(orderCounts));
    }

    // 수량 변경 함수
    function changeCnt(key, val) {
        let current = orderCounts[key] || 0;
        current += val;
        if (current < 0) current = 0;
        
        if (current === 0) {
            delete orderCounts[key];
        } else {
            orderCounts[key] = current;
        }
        render();
    }

    // 주문 요약 텍스트 업데이트
    function updateSummary() {
        const textDisplay = document.getElementById('summaryText');
        const totalDisplay = document.getElementById('totalCount');
        
        let total = 0;
        let summaryArr = [];

        for (const [menuName, count] of Object.entries(orderCounts)) {
            if (count > 0) {
                total += count;
                summaryArr.push(`${menuName} ${count}개`);
            }
        }

        totalDisplay.innerText = `총 ${total}개`;
        if (summaryArr.length === 0) {
            textDisplay.innerText = '선택된 메뉴가 없습니다.';
        } else {
            textDisplay.innerText = summaryArr.join(', ');
        }
    }

    // 수량만 전부 0으로 초기화
    function resetCounts() {
        if(confirm('현재 취합된 수량을 모두 초기화하시겠습니까?')) {
            orderCounts = {};
            render();
        }
    }

    // 메뉴 추가
    function addMenu() {
        const nameInput = document.getElementById('newMenuName');
        const hasTemp = document.getElementById('hasTemp').checked;
        const name = nameInput.value.trim();

        if (!name) return;
        if (menuList.some(m => m.name === name)) {
            alert('이미 등록된 메뉴입니다.');
            return;
        }

        menuList.push({ name, hasTemp });
        nameInput.value = '';
        render();
    }

    // 메뉴 삭제
    function deleteMenu(index) {
        if(confirm('메뉴판에서 이 메뉴를 삭제하시겠습니까?')) {
            const targetName = menuList[index].name;
            // 관련 수량도 같이 삭제
            delete orderCounts[targetName];
            delete orderCounts[`${targetName}(ICE)`];
            delete orderCounts[`${targetName}(HOT)`];
            
            menuList.splice(index, 1);
            render();
        }
    }

    // 클립보드 복사 기능
    function copyToClipboard() {
        const summaryText = document.getElementById('summaryText').innerText;
        const totalText = document.getElementById('totalCount').innerText;
        
        if (summaryText === '선택된 메뉴가 없습니다.') {
            alert('복사할 내역이 없습니다.');
            return;
        }

        const fullText = `[카페 주문 내역]\n${summaryText}\n(${totalText})`;
        
        navigator.clipboard.writeText(fullText).then(() => {
            alert('주문 내역이 클립보드에 복사되었습니다! 카톡이나 메시지에 붙여넣기 하세요.');
        }).catch(err => {
            alert('복사에 실패했습니다. 직접 드래그해서 복사해주세요.');
        });
    }

    // 최초 실행
    render();
</script>

</body>
</html>
